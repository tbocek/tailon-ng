name: build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cross-compile static binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os=${target%/*}
            arch=${target#*/}
            echo "building tailon-ng-$os-$arch"
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
              go build -trimpath -ldflags "-s -w -X main.version=$GITHUB_REF_NAME" -o "dist/tailon-ng-$os-$arch" .
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tailon-ng-*
