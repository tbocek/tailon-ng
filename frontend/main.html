<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Tailon-ng</title>
        <meta name="description" content="Tail and search your log files from the browser">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- The favicon is an inline SVG data URI: a terminal prompt in the
             theme colors, no separate file or extra request. -->
        <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%231d1f21'/%3E%3Cpath d='M3 5l3.5 3L3 11' stroke='%23ff974f' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M8.5 11.2h4.5' stroke='%23c5c8c6' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">

        <link rel="stylesheet" href="{{.RelativeRoot}}main.css">
        <script src="{{.RelativeRoot}}main.js" defer></script>
    </head>
    <body>
        <script>
         var relativeRoot = {{.RelativeRoot}};
        </script>

<div id="toolbar">
    <span class="combo">
        <input id="file-select" type="text" spellcheck="false" autocomplete="off" placeholder="file" title="File — click for the tree, type to filter">
        <div id="file-list" hidden></div>
    </span>
    <select id="mode-select" title="Mode"></select>
    <span class="sep"></span>
    <span class="filter">
        <span class="input-wrap">
            <input id="filter-input" type="text" spellcheck="false" autocomplete="off" placeholder="search and highlight shown lines">
            <span class="input-toggles">
                <button id="opt-case" title="Match case">Aa</button>
                <button id="opt-regex" title="Regular expression">.*</button>
                <button id="opt-invert" title="Invert: lines that do not match">!</button>
                <button id="opt-archives" title="Archives: list rotated archives (.gz, .1, …) in the selector and search them in find" hidden>gz</button>
            </span>
        </span>
        <select id="find-matches" title="Matches shown per file" hidden></select>
        <select id="find-ctx" title="Context lines around each match" hidden></select>
        <button id="filter-apply">find</button>
        <button id="search-prev" title="Previous match (Shift+Enter)" hidden>▲</button>
        <button id="search-next" title="Next match (Enter)" hidden>▼</button>
        <span id="search-count" hidden></span>
    </span>
    <span class="right">
        <a id="action-download" title="Download file" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><path d="M216 0h80c13.3 0 24 10.7 24 24v168h87.7c17.8 0 26.7 21.5 14.1 34.1L269.7 378.3c-7.5 7.5-19.8 7.5-27.3 0L90.1 226.1c-12.6-12.6-3.7-34.1 14.1-34.1H192V24c0-13.3 10.7-24 24-24zm296 376v112c0 13.3-10.7 24-24 24H24c-13.3 0-24-10.7-24-24V376c0-13.3 10.7-24 24-24h146.7l49 49c20.1 20.1 52.5 20.1 72.6 0l49-49H488c13.3 0 24 10.7 24 24zm-124 88c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20zm64 0c0-11-9-20-20-20s-20 9-20 20 9 20 20 20 20-9 20-20z"/></svg>
        </a>
        <button id="menu-toggle" title="Options">☰</button>
    </span>
    <div id="menu" hidden>
        <label><input id="cfg-wrap" type="checkbox"> wrap lines</label>
        <label><input id="cfg-live" type="checkbox"> live view</label>
        <a id="version" href="https://github.com/tbocek/tailon-ng/releases" target="_blank" rel="noopener" title="Releases">version {{.Version}}</a>
    </div>
    <div id="loading" hidden></div>
</div>

<div id="status" hidden></div>
<div id="toast" role="status"></div>

<div id="scrollable"><div id="logview"></div></div>

    </body>
</html>
